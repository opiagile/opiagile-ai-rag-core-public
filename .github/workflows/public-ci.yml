name: CI público

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validar:
    name: Validar snapshot público
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configurar Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Testar backend
        run: cd backend && ./mvnw test

      - name: Validar Docker Compose local
        run: |
          cp .env.example .env
          docker compose --env-file .env config

      - name: Verificar segredos versionados
        run: |
          ! git grep -nE 'sk-[A-Za-z0-9_-]+' -- . ':!.git'
          ! git grep -nE 'EAAG[A-Za-z0-9]+' -- . ':!.git'
          ! git grep -nE 'OPENAI_API_KEY=.*s[k]-' -- . ':!.git'
          ! git grep -nE 'WHATSAPP_ACCESS_TOKEN=EA[A-Za-z0-9]+' -- . ':!.git'
          ! git grep -nE 'WHATSAPP_APP_SECRET=[a-fA-F0-9]{32,}' -- . ':!.git'
          ! git grep -nE 'WHATSAPP_VERIFY_TOKEN=[A-Za-z0-9_-]{24,}' -- . ':!.git'
          ! git grep -nE 'SPRING_MAIL_PASSWORD=[^<${[:space:]][^[:space:]]{7,}' -- . ':!.git' ':!.github/workflows/public-ci.yml'
          ! git grep -nE 'BEGIN (RSA|OPENSSH|PRIVATE) KEY' -- . ':!.git'

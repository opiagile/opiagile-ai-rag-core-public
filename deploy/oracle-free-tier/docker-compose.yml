name: opiagile-rag-core

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/oracle-free-tier/Dockerfile.api
    image: opiagile-ai-rag-core:develop
    container_name: opiagile-rag-core-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-opiagile-ai-rag-core}
      APP_ENV: ${APP_ENV:-oracle-free-tier}
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.15}
      DOCUMENT_UPLOAD_MAX_BYTES: ${DOCUMENT_UPLOAD_MAX_BYTES:-262144}
      DOCUMENT_UPLOAD_MAX_CHARS: ${DOCUMENT_UPLOAD_MAX_CHARS:-200000}
      DOCUMENT_UPLOAD_MAX_CHUNKS: ${DOCUMENT_UPLOAD_MAX_CHUNKS:-300}
      DOCUMENT_UPLOAD_MAX_DOCUMENTS: ${DOCUMENT_UPLOAD_MAX_DOCUMENTS:-50}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-256KB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-300KB}
      DOCUMENT_CHUNK_MAX_CHARS: ${DOCUMENT_CHUNK_MAX_CHARS:-900}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-120}
      TENANT_DEFAULT_TENANT: ${TENANT_DEFAULT_TENANT:-demo}
      TENANT_DEFAULT_WORKSPACE: ${TENANT_DEFAULT_WORKSPACE:-clinica-demo}
      SITE_CHAT_ENABLED: ${SITE_CHAT_ENABLED:-true}
      SITE_CHAT_API_KEY: ${SITE_CHAT_API_KEY:-}
      SITE_CHAT_TENANT: ${SITE_CHAT_TENANT:-opiagile}
      SITE_CHAT_WORKSPACE: ${SITE_CHAT_WORKSPACE:-opiagile-rag}
      SITE_CHAT_RATE_LIMIT_PER_MINUTE: ${SITE_CHAT_RATE_LIMIT_PER_MINUTE:-20}
      DEMO_ACCESS_TOKEN: ${DEMO_ACCESS_TOKEN:-}
      DEMO_ADMIN_TOKEN: ${DEMO_ADMIN_TOKEN:-}
      DEMO_RATE_LIMIT_ENABLED: ${DEMO_RATE_LIMIT_ENABLED:-true}
      DEMO_CHAT_RATE_LIMIT_PER_MINUTE: ${DEMO_CHAT_RATE_LIMIT_PER_MINUTE:-30}
      DEMO_UPLOAD_RATE_LIMIT_PER_MINUTE: ${DEMO_UPLOAD_RATE_LIMIT_PER_MINUTE:-5}
      API_SECURITY_ENABLED: ${API_SECURITY_ENABLED:-true}
      API_SECURITY_REQUIRE_API_KEY: ${API_SECURITY_REQUIRE_API_KEY:-true}
      API_SECURITY_DEFAULT_RATE_LIMIT_PER_MINUTE: ${API_SECURITY_DEFAULT_RATE_LIMIT_PER_MINUTE:-60}
      OPENAPI_ENABLED: ${OPENAPI_ENABLED:-true}
      OPENAPI_UI_ENABLED: ${OPENAPI_UI_ENABLED:-false}
      DEVELOPER_ACCESS_EMAIL_ENABLED: ${DEVELOPER_ACCESS_EMAIL_ENABLED:-false}
      DEVELOPER_ACCESS_EMAIL_TO: ${DEVELOPER_ACCESS_EMAIL_TO:-contato@opiagile.com}
      DEVELOPER_ACCESS_EMAIL_FROM: ${DEVELOPER_ACCESS_EMAIL_FROM:-}
      DEVELOPER_ACCESS_EMAIL_SUBJECT_PREFIX: ${DEVELOPER_ACCESS_EMAIL_SUBJECT_PREFIX:-[Opiagile] Solicitação de API key sandbox}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_HEALTH_ENABLED: ${SPRING_MAIL_HEALTH_ENABLED:-false}
      DEVELOPER_ACCESS_EMAIL_SCHEDULER_ENABLED: ${DEVELOPER_ACCESS_EMAIL_SCHEDULER_ENABLED:-true}
      DEVELOPER_ACCESS_EMAIL_SCHEDULER_FIXED_DELAY_MS: ${DEVELOPER_ACCESS_EMAIL_SCHEDULER_FIXED_DELAY_MS:-60000}
      DEVELOPER_ACCESS_EMAIL_SCHEDULER_BATCH_SIZE: ${DEVELOPER_ACCESS_EMAIL_SCHEDULER_BATCH_SIZE:-5}
      DEVELOPER_ACCESS_EMAIL_SCHEDULER_MAX_ATTEMPTS: ${DEVELOPER_ACCESS_EMAIL_SCHEDULER_MAX_ATTEMPTS:-10}
      DEVELOPER_ACCESS_EMAIL_SCHEDULER_RETRY_DELAY_MINUTES: ${DEVELOPER_ACCESS_EMAIL_SCHEDULER_RETRY_DELAY_MINUTES:-15}
      CONVERSATION_HISTORY_LIMIT: ${CONVERSATION_HISTORY_LIMIT:-8}
      LLM_PROVIDER: ${LLM_PROVIDER:-DEMO}
      CHAT_RESPONSE_MODE: ${CHAT_RESPONSE_MODE:-DEMO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDINGS_ENABLED: ${OPENAI_EMBEDDINGS_ENABLED:-false}
      OPENAI_EMBEDDINGS_PROVIDER: ${OPENAI_EMBEDDINGS_PROVIDER:-manual}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      SPRING_AI_MODEL_EMBEDDING: ${SPRING_AI_MODEL_EMBEDDING:-none}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-600}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-minimal}
      OPENAI_TEXT_VERBOSITY: ${OPENAI_TEXT_VERBOSITY:-low}
      CHAT_SYSTEM_TONE: ${CHAT_SYSTEM_TONE:-profissional, claro, acolhedor e objetivo}
      TOOLS_EXECUTION_REQUIRE_ADMIN_TOKEN: ${TOOLS_EXECUTION_REQUIRE_ADMIN_TOKEN:-true}
      TOOLS_PLANNER_LLM_ENABLED: ${TOOLS_PLANNER_LLM_ENABLED:-true}
      TOOLS_PLANNER_LLM_MAX_OUTPUT_TOKENS: ${TOOLS_PLANNER_LLM_MAX_OUTPUT_TOKENS:-120}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      WHATSAPP_PROVIDER: MOCK
      WHATSAPP_SEND_ENABLED: "false"
      WHATSAPP_DRY_RUN: "true"
    networks:
      - internal
    mem_limit: 2g
    cpus: "1.50"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  demo-web:
    profiles:
      - demo
    build:
      context: ../../../opiagile-rag-demo-web
      dockerfile: Dockerfile
    image: opiagile-rag-demo-web:main
    container_name: opiagile-rag-demo-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      OPIAGILE_RAG_CORE_BASE_URL: http://api:8080
      OPIAGILE_RAG_CORE_API_KEY: ${DEMO_RAG_CORE_API_KEY:-}
      OPIAGILE_RAG_CORE_API_KEY_CLINICA_DEMO: ${DEMO_RAG_CORE_API_KEY_CLINICA_DEMO:-}
      OPIAGILE_RAG_CORE_API_KEY_ATENDIMENTO_DEMO: ${DEMO_RAG_CORE_API_KEY_ATENDIMENTO_DEMO:-}
      OPIAGILE_RAG_CORE_API_KEY_LOCACAO_DEMO: ${DEMO_RAG_CORE_API_KEY_LOCACAO_DEMO:-}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - internal
    mem_limit: 768m
    cpus: "0.50"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  site:
    build:
      context: ../../../opiagile-site
      dockerfile: Dockerfile
    image: opiagile-site:main
    container_name: opiagile-site
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      OPIAGILE_RAG_CORE_BASE_URL: http://api:8080
      OPIAGILE_RAG_CORE_API_KEY: ${OPIAGILE_SITE_RAG_CORE_API_KEY:-}
      OPIAGILE_SITE_CHAT_API_KEY: ${SITE_CHAT_API_KEY:-}
      OPIAGILE_SITE_CHAT_RATE_LIMIT_PER_MINUTE: ${OPIAGILE_SITE_CHAT_RATE_LIMIT_PER_MINUTE:-10}
      BLOG_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - internal
    mem_limit: 768m
    cpus: "0.50"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: opiagile-rag-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    mem_limit: 3g
    cpus: "1.00"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    container_name: opiagile-rag-core-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      site:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:9090:9090"
    environment:
      RAG_DOMAIN: ${RAG_DOMAIN:-}
      SITE_DOMAIN: ${SITE_DOMAIN:-opiagile.com}
      SITE_WWW_DOMAIN: ${SITE_WWW_DOMAIN:-www.opiagile.com}
      DEMO_RAG_DOMAIN: ${DEMO_RAG_DOMAIN:-demo-rag.opiagile.com}
      ACME_EMAIL: ${ACME_EMAIL:-}
      CADDY_REQUEST_BODY_MAX_SIZE: ${CADDY_REQUEST_BODY_MAX_SIZE:-300KB}
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile.http}:/etc/caddy/Caddyfile:ro
      - ./admin-panel:/srv/admin-panel:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    mem_limit: 256m
    cpus: "0.25"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
